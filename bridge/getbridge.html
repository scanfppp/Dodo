<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>桥梁3D模型生成器</title>
    <script src="https://cdn.jsdelivr.net/npm/three@0.132.2/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.132.2/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.132.2/examples/js/exporters/GLTFExporter.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #f0f0f0;
        }

        #container {
            width: 100vw;
            height: 100vh;
        }

        #controls {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(255, 255, 255, 0.9);
            padding: 10px;
            border-radius: 5px;
        }

        button {
            padding: 8px 15px;
            margin: 5px;
            background: #4A90E2;
            color: white;
            border: none;
            border-radius: 3px;
            cursor: pointer;
        }

        button:hover {
            background: #357ABD;
        }
    </style>
</head>

<body>
    <div id="container"></div>
    <div id="controls">
        <button onclick="exportGLTF()">导出GLTF文件</button>
        <button onclick="exportGLB()">导出GLB文件</button>
    </div>

    <script>
        // 场景初始化
        let scene, camera, renderer, controls;

        init();
        animate();

        function init() {
            // 创建场景
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xeeeeee);

            // 创建相机
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(5, 3, 5);

            // 创建渲染器
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            document.getElementById('container').appendChild(renderer.domElement);

            // 添加轨道控制
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;

            // 添加灯光
            addLights();

            // 创建桥梁模型
            createBridgeModel();

            // 添加坐标轴辅助
            const axesHelper = new THREE.AxesHelper(2);
            scene.add(axesHelper);

            // 窗口调整
            window.addEventListener('resize', onWindowResize);
        }

        function addLights() {
            // 环境光
            const ambientLight = new THREE.AmbientLight(0x404040, 0.6);
            scene.add(ambientLight);

            // 方向光
            const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
            directionalLight.position.set(10, 10, 5);
            directionalLight.castShadow = true;
            directionalLight.shadow.mapSize.width = 2048;
            directionalLight.shadow.mapSize.height = 2048;
            scene.add(directionalLight);
        }

        function createBridgeModel() {
            // 材质定义
            const bridgeMaterial = new THREE.MeshPhysicalMaterial({
                color: 0x4A90E2,
                metalness: 0.7,
                roughness: 0.3,
                transparent: true,
                opacity: 0.9
            });

            const supportMaterial = new THREE.MeshPhysicalMaterial({
                color: 0x7ED321,
                metalness: 0.3,
                roughness: 0.6
            });

            const boltMaterial = new THREE.MeshPhysicalMaterial({
                color: 0x888888,
                metalness: 0.9,
                roughness: 0.1
            });

            // 尺寸定义 (单位: 米)
            const bridgeWidth = 0.75;    // 750mm
            const bridgeHeight = 0.06;   // 60mm
            const bridgeLength = 1.0;    // 1000mm

            const supportWidth = 0.45;   // 450mm
            const supportHeight = 0.26;  // 260mm
            const supportDepth = 0.26;   // 260mm

            // 创建三块桥面板
            const bridgeGeometry = new THREE.BoxGeometry(bridgeLength, bridgeHeight, bridgeWidth);

            // 构件2 - 左边桥面
            const component2 = new THREE.Mesh(bridgeGeometry, bridgeMaterial);
            component2.position.set(-bridgeLength, bridgeHeight / 2 + supportHeight, 0);
            component2.castShadow = true;
            component2.receiveShadow = true;
            component2.name = "Component_2_Left_Bridge";
            scene.add(component2);

            // 构件3 - 中间桥面
            const component3 = new THREE.Mesh(bridgeGeometry, bridgeMaterial);
            component3.position.set(0, bridgeHeight / 2 + supportHeight, 0);
            component3.castShadow = true;
            component3.receiveShadow = true;
            component3.name = "Component_3_Middle_Bridge";
            scene.add(component3);

            // 构件4 - 右边桥面
            const component4 = new THREE.Mesh(bridgeGeometry, bridgeMaterial);
            component4.position.set(bridgeLength, bridgeHeight / 2 + supportHeight, 0);
            component4.castShadow = true;
            component4.receiveShadow = true;
            component4.name = "Component_4_Right_Bridge";
            scene.add(component4);

            // 创建中间支座
            const supportGeometry = new THREE.BoxGeometry(supportWidth, supportHeight, supportDepth);
            const middleSupport = new THREE.Mesh(supportGeometry, supportMaterial);
            middleSupport.position.set(0, supportHeight / 2, 0);
            middleSupport.castShadow = true;
            middleSupport.receiveShadow = true;
            middleSupport.name = "Middle_Support";
            scene.add(middleSupport);

            // 创建螺栓连接 (简化表示)
            createBolts(component2, component3, component4, bridgeHeight + supportHeight, boltMaterial);

            // 添加地面
            const groundGeometry = new THREE.PlaneGeometry(10, 10);
            const groundMaterial = new THREE.MeshLambertMaterial({ color: 0xcccccc });
            const ground = new THREE.Mesh(groundGeometry, groundMaterial);
            ground.rotation.x = -Math.PI / 2;
            ground.receiveShadow = true;
            ground.name = "Ground";
            scene.add(ground);
        }

        function createBolts(comp2, comp3, comp4, height, material) {
            const boltGeometry = new THREE.CylinderGeometry(0.02, 0.02, 0.08, 12);

            // 在构件连接处添加螺栓
            const boltPositions = [
                // 构件2与构件3之间的连接
                { x: -0.5, z: 0.3 }, { x: -0.5, z: -0.3 },
                { x: -0.5, z: 0.15 }, { x: -0.5, z: -0.15 },

                // 构件3与构件4之间的连接  
                { x: 0.5, z: 0.3 }, { x: 0.5, z: -0.3 },
                { x: 0.5, z: 0.15 }, { x: 0.5, z: -0.15 }
            ];

            boltPositions.forEach((pos, index) => {
                const bolt = new THREE.Mesh(boltGeometry, material);
                bolt.position.set(pos.x, height + 0.04, pos.z);
                bolt.rotation.x = Math.PI / 2;
                bolt.castShadow = true;
                bolt.name = `Bolt_${index + 1}`;
                scene.add(bolt);
            });
        }

        function exportGLTF() {
            const exporter = new THREE.GLTFExporter();
            exporter.parse(
                scene,
                function (gltf) {
                    downloadJSON(gltf, 'bridge_model.gltf');
                },
                function (error) {
                    console.error('GLTF导出错误:', error);
                },
                { binary: false }
            );
        }

        function exportGLB() {
            const exporter = new THREE.GLTFExporter();
            exporter.parse(
                scene,
                function (gltf) {
                    downloadBinary(gltf, 'bridge_model.glb');
                },
                function (error) {
                    console.error('GLB导出错误:', error);
                },
                { binary: true }
            );
        }

        function downloadJSON(data, filename) {
            const blob = new Blob([JSON.stringify(data)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            downloadURL(url, filename);
        }

        function downloadBinary(data, filename) {
            const blob = new Blob([data], { type: 'application/octet-stream' });
            const url = URL.createObjectURL(blob);
            downloadURL(url, filename);
        }

        function downloadURL(url, filename) {
            const link = document.createElement('a');
            link.href = url;
            link.download = filename;
            link.click();
            URL.revokeObjectURL(url);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
    </script>
</body>

</html>
